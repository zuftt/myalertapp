<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 880" font-family="'Virgil', 'Cascadia', 'Comic Sans MS', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e1e1e"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1971c2"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e8590c"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f9e44"/>
    </marker>
  </defs>

  <rect width="1200" height="880" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" font-size="28" font-weight="bold" fill="#1e1e1e">Alert System — Architecture &amp; Flow</text>
  <text x="600" y="72" text-anchor="middle" font-size="15" fill="#5c5f66">User submissions → Admin verification → Real-time broadcast to all users</text>

  <!-- Firebase block (top center) -->
  <rect x="430" y="110" width="340" height="90" rx="12" ry="12" fill="#fff3bf" stroke="#f08c00" stroke-width="2.5"/>
  <text x="600" y="142" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e1e1e">Firebase</text>
  <text x="600" y="170" text-anchor="middle" font-size="14" fill="#1e1e1e">Authentication  ·  Cloud Firestore</text>
  <text x="600" y="190" text-anchor="middle" font-size="12" fill="#5c5f66">push notifications via Expo</text>

  <!-- USER box (left) -->
  <rect x="60" y="240" width="220" height="80" rx="10" ry="10" fill="#a5d8ff" stroke="#1971c2" stroke-width="2.5"/>
  <text x="170" y="275" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e1e1e">USER</text>
  <text x="170" y="298" text-anchor="middle" font-size="13" fill="#1e1e1e">community member</text>

  <!-- ADMIN box (right) -->
  <rect x="920" y="240" width="220" height="80" rx="10" ry="10" fill="#ffd8a8" stroke="#e8590c" stroke-width="2.5"/>
  <text x="1030" y="275" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e1e1e">ADMIN</text>
  <text x="1030" y="298" text-anchor="middle" font-size="13" fill="#1e1e1e">moderator</text>

  <!-- USER -> Firebase auth -->
  <path d="M 230 240 Q 230 200 430 175" stroke="#1971c2" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="290" y="208" font-size="12" fill="#1971c2">sign up / login</text>

  <!-- ADMIN -> Firebase auth -->
  <path d="M 970 240 Q 970 200 770 175" stroke="#e8590c" stroke-width="2" fill="none" marker-end="url(#arrowOrange)"/>
  <text x="830" y="208" font-size="12" fill="#e8590c">login</text>

  <!-- User Dashboard -->
  <rect x="60" y="380" width="220" height="70" rx="10" ry="10" fill="#ffffff" stroke="#1971c2" stroke-width="2"/>
  <text x="170" y="412" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e1e1e">User Dashboard</text>
  <text x="170" y="432" text-anchor="middle" font-size="12" fill="#5c5f66">home · inbox · profile</text>

  <!-- Admin Dashboard -->
  <rect x="920" y="380" width="220" height="70" rx="10" ry="10" fill="#ffffff" stroke="#e8590c" stroke-width="2"/>
  <text x="1030" y="412" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e1e1e">Admin Dashboard</text>
  <text x="1030" y="432" text-anchor="middle" font-size="12" fill="#5c5f66">verify · broadcast</text>

  <!-- USER box -> User Dashboard -->
  <path d="M 170 320 L 170 380" stroke="#1971c2" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <!-- ADMIN box -> Admin Dashboard -->
  <path d="M 1030 320 L 1030 380" stroke="#e8590c" stroke-width="2" fill="none" marker-end="url(#arrowOrange)"/>

  <!-- Submit Alert (user action) -->
  <rect x="60" y="500" width="220" height="60" rx="10" ry="10" fill="#d0ebff" stroke="#1971c2" stroke-width="2"/>
  <text x="170" y="528" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e1e1e">Submit Alert</text>
  <text x="170" y="548" text-anchor="middle" font-size="12" fill="#5c5f66">+ GPS location</text>

  <!-- Verify Reports (admin action) -->
  <rect x="920" y="500" width="220" height="60" rx="10" ry="10" fill="#ffe8cc" stroke="#e8590c" stroke-width="2"/>
  <text x="1030" y="528" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e1e1e">Verify Reports</text>
  <text x="1030" y="548" text-anchor="middle" font-size="12" fill="#5c5f66">true / false</text>

  <!-- Broadcast / Manage Alerts (admin action) -->
  <rect x="920" y="600" width="220" height="60" rx="10" ry="10" fill="#ffe8cc" stroke="#e8590c" stroke-width="2"/>
  <text x="1030" y="628" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e1e1e">Broadcast Alerts</text>
  <text x="1030" y="648" text-anchor="middle" font-size="12" fill="#5c5f66">read · write · delete</text>

  <!-- Dashboard -> action arrows -->
  <path d="M 170 450 L 170 500" stroke="#1971c2" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <path d="M 1030 450 L 1030 500" stroke="#e8590c" stroke-width="2" fill="none" marker-end="url(#arrowOrange)"/>
  <path d="M 1080 450 Q 1130 530 1080 600" stroke="#e8590c" stroke-width="2" fill="none" marker-end="url(#arrowOrange)"/>

  <!-- Reports collection (center) -->
  <rect x="430" y="490" width="340" height="80" rx="10" ry="10" fill="#fff3bf" stroke="#f08c00" stroke-width="2.5" stroke-dasharray="6 4"/>
  <text x="600" y="520" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e1e1e">Reports  (Firestore)</text>
  <text x="600" y="542" text-anchor="middle" font-size="12" fill="#5c5f66">user submissions · pending verification</text>
  <text x="600" y="560" text-anchor="middle" font-size="12" fill="#5c5f66">{ caseType, details, location, verified }</text>

  <!-- Alerts collection (center, below) -->
  <rect x="430" y="610" width="340" height="80" rx="10" ry="10" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2.5"/>
  <text x="600" y="640" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e1e1e">Alerts  (Firestore)</text>
  <text x="600" y="662" text-anchor="middle" font-size="12" fill="#5c5f66">verified  ·  broadcast to every user</text>
  <text x="600" y="680" text-anchor="middle" font-size="12" fill="#5c5f66">{ title, description, location, createdAt }</text>

  <!-- Submit Alert -> Reports -->
  <path d="M 280 530 L 430 530" stroke="#1971c2" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="335" y="522" font-size="11" fill="#1971c2">create</text>

  <!-- Verify Reports -> Reports (read) -->
  <path d="M 920 530 L 770 530" stroke="#e8590c" stroke-width="2" fill="none" marker-end="url(#arrowOrange)"/>
  <text x="800" y="522" font-size="11" fill="#e8590c">read</text>

  <!-- Reports -> Alerts (if verified) -->
  <path d="M 600 570 L 600 610" stroke="#2f9e44" stroke-width="2.5" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="608" y="595" font-size="12" fill="#2f9e44" font-weight="bold">if verified = true</text>

  <!-- Broadcast Alerts -> Alerts (RWD) -->
  <path d="M 920 640 L 770 650" stroke="#e8590c" stroke-width="2" fill="none" marker-end="url(#arrowOrange)"/>
  <text x="790" y="635" font-size="11" fill="#e8590c">read · write · delete</text>

  <!-- User views (bottom left) -->
  <rect x="60" y="730" width="220" height="60" rx="10" ry="10" fill="#d0ebff" stroke="#1971c2" stroke-width="2"/>
  <text x="170" y="758" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e1e1e">Inbox  ·  Map pins</text>
  <text x="170" y="778" text-anchor="middle" font-size="12" fill="#5c5f66">visible to every user</text>

  <!-- Alerts -> User views (real-time fan-out) -->
  <path d="M 430 660 Q 250 690 230 730" stroke="#2f9e44" stroke-width="2.5" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="290" y="700" font-size="12" font-weight="bold" fill="#2f9e44">real-time onSnapshot</text>

  <!-- User Dashboard -> Inbox/Map (the user navigates) -->
  <path d="M 170 450 Q 30 580 60 760" stroke="#1971c2" stroke-width="1.5" fill="none" stroke-dasharray="5 4"/>
  <text x="10" y="600" font-size="11" fill="#1971c2" transform="rotate(-90 30 600)">navigates</text>

  <!-- Legend -->
  <rect x="430" y="740" width="340" height="110" rx="8" ry="8" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="450" y="762" font-size="13" font-weight="bold" fill="#1e1e1e">Legend</text>
  <rect x="450" y="772" width="14" height="14" fill="#a5d8ff" stroke="#1971c2" stroke-width="1.5"/>
  <text x="472" y="784" font-size="12" fill="#1e1e1e">User actions / screens</text>
  <rect x="450" y="792" width="14" height="14" fill="#ffd8a8" stroke="#e8590c" stroke-width="1.5"/>
  <text x="472" y="804" font-size="12" fill="#1e1e1e">Admin actions / screens</text>
  <rect x="450" y="812" width="14" height="14" fill="#fff3bf" stroke="#f08c00" stroke-width="1.5"/>
  <text x="472" y="824" font-size="12" fill="#1e1e1e">Firebase services / collections</text>
  <rect x="450" y="832" width="14" height="14" fill="#b2f2bb" stroke="#2f9e44" stroke-width="1.5"/>
  <text x="472" y="844" font-size="12" fill="#1e1e1e">Real-time broadcast (verified)</text>
</svg>
